<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">

    <div id="app">

        <h1 class="title">🐍 Snake Game</h1>

        <div class="container">

            <div class="game-box">
                <canvas id="game" width="400" height="400"></canvas>
            </div>

            <div class="panel">

                <div class="card">
                    <h2>Thông tin</h2>
                    <p id="score">Score: 0</p>
                    <p id="best">Best: 0</p>
                </div>

                <div class="card">
                    <h2>Độ khó</h2>
                    <div class="buttons">
                        <button onclick="selectLevel('easy')">Dễ</button>
                        <button onclick="selectLevel('medium')">Trung bình</button>
                        <button onclick="selectLevel('hard')">Khó</button>
                    </div>
                </div>

                <div id="gameOver" class="card gameover">
                    <h2>Game Over</h2>
                    <button onclick="restartGame()">Chơi lại</button>
                </div>

            </div>

        </div>
    </div>

    <script src="snake.js"></script>
</div>

</body>
</html>
